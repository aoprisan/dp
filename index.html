<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2ecdf" />
  <meta name="description" content="Dress Panic — the archive for the things you wear." />

  <title>Dress Panic — The Archive</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preload" href="fonts/fraunces-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/instrumentsans-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/jetbrainsmono-normal-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <!-- Masthead -->
    <header class="masthead">
      <div class="masthead__issue mono">
        <span>Vol. 1 <span class="dot"></span> No. 2</span>
        <span id="edition-badge" data-offline="false">June 2026</span>
        <button class="btn-install" id="install-btn" hidden>Install</button>
      </div>
      <h1 class="masthead__title">Dress Panic<span class="period">.</span></h1>
      <hr class="masthead__rule" />
    </header>

    <!-- Archive section -->
    <section id="archive" aria-label="The Archive">
      <div class="section-head">
        <h2>The Archive</h2>
        <span class="count mono" id="piece-count"><strong>000</strong> pieces</span>
      </div>

      <div class="scopes" role="group" aria-label="Filter by privacy">
        <button class="scope" data-scope="all" aria-pressed="true">All</button>
        <button class="scope" data-scope="public" aria-pressed="false">Public</button>
        <button class="scope" data-scope="followers" aria-pressed="false">Circle</button>
        <button class="scope" data-scope="private" aria-pressed="false">Private</button>
      </div>

      <div class="tag-rail" id="tag-rail" role="group" aria-label="Filter by tag"></div>

      <div class="grid" id="grid"></div>

      <div class="empty" id="empty" hidden>
        <span class="fleuron">✼</span>
        <h3 id="empty-title">Nothing filed yet.</h3>
        <p id="empty-sub">Every archive begins with a single piece. Add the thing you wore today.</p>
      </div>
    </section>

    <button class="btn-add" id="btn-add">
      <span class="plus">+</span> Add a piece
    </button>

  </main>

  <!-- Tab bar -->
  <nav class="tabbar" aria-label="Main">
    <div class="tabbar__inner">
      <button class="tab" aria-current="page" data-tab="archive">
        <span class="glyph">A</span> Archive
      </button>
      <button class="tab" data-tab="looks">
        <span class="glyph">L</span> Looks <span class="soon">soon</span>
      </button>
      <button class="tab" data-tab="feed">
        <span class="glyph">F</span> Feed <span class="soon">soon</span>
      </button>
      <button class="tab" data-tab="you">
        <span class="glyph">Y</span> You <span class="soon">soon</span>
      </button>
    </div>
  </nav>

  <!-- Add / edit piece sheet -->
  <dialog class="sheet" id="editor">
    <form class="sheet__frame" id="editor-form" method="dialog" novalidate>
      <header class="sheet__head">
        <div>
          <span class="kicker mono" id="editor-kicker">New entry</span>
          <h2 id="editor-title">Add a Piece</h2>
        </div>
        <button type="button" class="btn-close" data-close aria-label="Close">✕</button>
      </header>

      <div class="sheet__body">
        <div class="field">
          <label class="field__label" for="photo-input">
            <span class="index">01</span> Photographs
          </label>
          <button type="button" class="photo-drop" id="photo-drop">
            <span class="big">+</span>
            Add photographs
          </button>
          <input type="file" id="photo-input" accept="image/*" multiple hidden />
          <div class="photo-strip" id="photo-strip"></div>
        </div>

        <div class="field">
          <label class="field__label" for="f-title">
            <span class="index">02</span> Title
          </label>
          <input type="text" class="input-title" id="f-title" placeholder="Linen overshirt" autocomplete="off" />
        </div>

        <div class="field">
          <label class="field__label" for="f-desc">
            <span class="index">03</span> Notes <span class="opt">optional</span>
          </label>
          <textarea id="f-desc" rows="2" placeholder="Fabric, fit, where it came from…"></textarea>
        </div>

        <div class="field">
          <span class="field__label"><span class="index">04</span> Tags <span class="opt">optional</span></span>
          <div class="tag-picker" id="tag-picker"></div>
          <div class="tag-new">
            <input type="text" id="tag-new-input" placeholder="new tag…" autocomplete="off" />
            <button type="button" class="btn-ghost" id="tag-new-btn">Add</button>
          </div>
        </div>

        <div class="field">
          <span class="field__label"><span class="index">05</span> Visibility</span>
          <div class="privacy" id="privacy">
            <label>
              <input type="radio" name="privacy" value="public" checked />
              <span class="mark">○</span>
              <span class="privacy__name">Public</span>
              <span class="privacy__hint">On the record — anyone may see it.</span>
            </label>
            <label>
              <input type="radio" name="privacy" value="followers" />
              <span class="mark">◐</span>
              <span class="privacy__name">Circle</span>
              <span class="privacy__hint">Followers only, when the circle arrives.</span>
            </label>
            <label>
              <input type="radio" name="privacy" value="private" />
              <span class="mark">●</span>
              <span class="privacy__name">Private</span>
              <span class="privacy__hint">For your eyes alone.</span>
            </label>
          </div>
        </div>
      </div>

      <footer class="sheet__foot">
        <button type="submit" class="btn-primary" id="editor-save">File into the archive</button>
      </footer>
    </form>
  </dialog>

  <!-- Piece detail sheet -->
  <dialog class="sheet" id="detail">
    <div class="sheet__frame">
      <header class="sheet__head">
        <div>
          <span class="kicker mono">From the archive</span>
          <h2>The Piece</h2>
        </div>
        <button type="button" class="btn-close" data-close aria-label="Close">✕</button>
      </header>
      <div class="sheet__body" id="detail-body"></div>
    </div>
  </dialog>

  <div class="toast mono" id="toast" role="status"></div>

  <script src="app.js" type="module"></script>
</body>
</html>
